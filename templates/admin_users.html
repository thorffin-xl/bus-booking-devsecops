{% extends 'base.html' %}
{% block title %}Users{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-people-fill"></i> All Users</h4>
<div class="card">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-hover">
        <thead class="table-dark">
          <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Bookings</th></tr>
        </thead>
        <tbody>
          {% for u in users %}
          <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.name }}</td>
            <td>{{ u.email }}</td>
            <td><span class="badge {{ 'bg-danger' if u.role == 'admin' else 'bg-secondary' }}">{{ u.role }}</span></td>
            <td>{{ u.bookings | length }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
